<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Álbumes</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */

body{
font-family:system-ui;
background:#020617;
color:white;
min-height:100vh;
overflow-x:hidden;
padding:40px;
}

/* GALAXIA */

body::before{
content:"";
position:fixed;
inset:0;
background:

radial-gradient(circle at 20% 30%,rgba(236,72,153,.35),transparent 40%),
radial-gradient(circle at 80% 20%,rgba(168,85,247,.35),transparent 40%),
radial-gradient(circle at 60% 70%,rgba(34,211,238,.35),transparent 40%),
radial-gradient(circle at 30% 80%,rgba(34,197,94,.35),transparent 40%);

filter:blur(120px);
z-index:-2;
}

/* ESTRELLAS */

body::after{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 150px,#fff,transparent),
radial-gradient(1px 1px at 200px 80px,#fff,transparent),
radial-gradient(2px 2px at 300px 200px,#fff,transparent),
radial-gradient(1px 1px at 400px 100px,#fff,transparent),
radial-gradient(2px 2px at 500px 250px,#fff,transparent),
radial-gradient(1px 1px at 700px 120px,#fff,transparent),
radial-gradient(2px 2px at 900px 300px,#fff,transparent);

background-size:1000px 600px;
animation:stars 60s linear infinite;
z-index:-1;
}

@keyframes stars{

from{
transform:translateY(0);
}

to{
transform:translateY(-1000px);
}

}

/* TITULO */

h1{
text-align:center;
font-size:40px;
margin-bottom:40px;

background:linear-gradient(90deg,#ec4899,#a855f7,#22d3ee,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
max-width:1000px;
margin:auto;
}

/* ALBUM */

.album{
background:rgba(15,23,42,.6);
backdrop-filter:blur(20px);
border-radius:14px;
padding:10px;
cursor:pointer;
transition:.35s;

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 10px 30px rgba(0,0,0,.8),
0 0 20px rgba(236,72,153,.2);
}

.album:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:
0 20px 40px rgba(0,0,0,.9),
0 0 25px rgba(168,85,247,.4);

}

.album img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.album h3{
margin:10px 0 5px;
}

.album p{
color:#cbd5f5;
font-size:14px;
}

/* TRACKS */

#tracks{
max-width:700px;
margin:60px auto;
}

#tracks h2{
margin-bottom:15px;
}

.track{

background:rgba(15,23,42,.7);

padding:12px;
border-radius:10px;

margin:8px 0;

cursor:pointer;

transition:.25s;

border:1px solid rgba(255,255,255,.05);

}

.track:hover{

background:#1e293b;

transform:translateX(6px);

}

/* PLAYER */

.player{

margin-top:30px;

text-align:center;

}

audio{

width:100%;
max-width:500px;

filter:
drop-shadow(0 0 10px #ec4899)
drop-shadow(0 0 10px #a855f7);

}

</style>
</head>

<body>

<h1>Álbumes del Universo 💫</h1>

<div id="album-grid" class="grid"></div>

<div id="tracks"></div>

<div class="player">
<audio id="player" controls></audio>
</div>

<script>

/* ALBUMES */

const albums=[

{
title:"Que te amo demasiado",
image:"img1.jpg",
description:"cositas que siento por ti",
tracks:[
{title:"te amo demasiado",file:"cancion1.mp3"},
{title:"me enamore de ti",file:"cancion2.mp3"},
{title:"quiero estar contigo",file:"cancion3.mp3"}
]
},

{
title:"Lo hermosa que eres",
image:"img2.jpg",
description:"lo hermosa que eres",
tracks:[
{title:"eres muy hermosa",file:"cancion4.mp3"},
{title:"tu sonrisa",file:"cancion5.mp3"},
{title:"tu belleza",file:"cancion6.mp3"}
]
},

{
title:"Anecdotas",
image:"img3.jpg",
description:"momentos juntos",
tracks:[
{title:"cuando nos conocimos",file:"cancion7.mp3"},
{title:"ese momento raro",file:"cancion8.mp3"}
]
}

];


/* CREAR ALBUMES */

const grid=document.getElementById("album-grid");

albums.forEach((album,index)=>{

const div=document.createElement("div");

div.className="album";

div.innerHTML=`

<img src="${album.image}">
<h3>${album.title}</h3>
<p>${album.description}</p>

`;

div.onclick=()=>showTracks(index);

grid.appendChild(div);

});


/* MOSTRAR CANCIONES */

function showTracks(index){

const container=document.getElementById("tracks");

container.innerHTML="<h2>Canciones</h2>";

albums[index].tracks.forEach((track,i)=>{

const div=document.createElement("div");

div.className="track";

div.innerText=(i+1)+". "+track.title;

div.onclick=()=>playSong(track.file);

container.appendChild(div);

});

}


/* REPRODUCIR */

function playSong(file){

const player=document.getElementById("player");

player.src=file;

player.play();

}

</script>

</body>
</html>
